services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: smartcity
      POSTGRES_USER: smartcity
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartcity_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcity"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://smartcity:${DB_PASSWORD:-smartcity_dev}@db:5432/smartcity
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:3001
    depends_on:
      - backend

volumes:
  pgdata:
