services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: smartcity
      POSTGRES_USER: smartcity
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartcity_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://smartcity:${DB_PASSWORD:-smartcity_dev}@db:5432/smartcity
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
    depends_on:
      - db
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
